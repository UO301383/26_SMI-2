version: '2'
services:

  db:
    image: mysql:8.0.21
    container_name: smi-db-service
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_DATABASE=smi_db
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
      - MYSQL_ROOT_PASSWORD=rootpassword
    expose:
      - "3306"
      - "33060"
    volumes:
      - ./volumes/data:/var/lib/mysql
    networks:
      - smi_network

  backend:
    build: ./
    image: smi-backend-service
    container_name: smi-backend-service
    environment:
      - PORT=3000
      - DATABASE_NAME=smi_db
      - DATABASE_USER=user
      - DATABASE_PASSWORD=password
      - DATABASE_HOST=db
      - DATABASE_PORT=3306
      - WAIT_HOSTS=db:3306
    ports:
      - "3000:3000"
    volumes:
      - ./volumes/public:/public
      - ./volumes/uploads:/uploads
    depends_on:
      - db
    networks:
      - smi_network

  web-server:
    image: nginx
    container_name: smi-web-server
    restart: always
    expose:
      - "80/tcp"
    ports:
      - "8080:80"
    volumes:
      - ./volumes/public:/usr/share/nginx/html:ro
    environment:
      - NGINX_PORT=80
    networks:
      - smi_network

networks:
  smi_network:
    driver: bridge